<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar receitas</title>
    <link rel="stylesheet" href="../css/novidades.css">
</head>

<body>

    <header class="cabeca">

        <div class="logo">
            <img src="../imagem/logo.png" alt="logo">
        </div>

        <input
            class="pesquisa"
            type="text"
            placeholder="Digite aqui...">

        <div class="tema" id="toggle-tema">
            <img id="icone-tema" src="../imagem/lua.png" alt="tema">
        </div>

        <div class="perfil">
            <a href="perfil.html">
                <img src="../imagem/perfil.png" alt="perfil">
            </a>
        </div>

    </header>

    <div class="linha"></div>

    <nav class="menu">
        <a href="../html/home.html">Início</a>
        <a href="../html/cardapio.html">Cardápio</a>
        <a href="../html/receitasadd.html" class="ativo">Adicionar</a>
        <a href="../html/relatorio.html">Relatórios</a>
    </nav>

    <form class="formulario">

        <h2>Adicionar Nova Receita</h2>

        <p class="descricao-form">
            Preencha as informações abaixo para cadastrar sua receita.
        </p>

        <!-- NOME -->

        <div class="campo">

            <label for="titulo">Nome da receita</label>

            <input
                class="resposta"
                id="titulo"
                type="text"
                placeholder="Ex: Coxinha de jaca"
                required>

        </div>

    <!-- INGREDIENTES -->

<div class="campo">

    <label>Ingredientes</label>

    <div id="listaIngredientes">

        <div class="linha-ingrediente">

            <input
                type="number"
                class="quantidade"
                placeholder="Qtd"
                step="0.01"
                min="0">

            <select class="unidade">

                <option value="">Unidade</option>
                <option value="g">g</option>
                <option value="kg">kg</option>
                <option value="ml">ml</option>
                <option value="L">L</option>
                <option value="un">un</option>
                <option value="colher">colher</option>
                <option value="xícara">xícara</option>
                <option value="pitada">pitada</option>

            </select>

            <div class="autocomplete">

                <input
                    type="text"
                    class="ingrediente"
                    placeholder="Digite um ingrediente"
                    autocomplete="off">

                <div class="lista-sugestoes"></div>

            </div>

            <button
                type="button"
                class="btn-remover">
                ✕
            </button>

        </div>

    </div>

    <button
        type="button"
        id="btnAdicionarIngrediente"
        class="btn-add-ingrediente">

        + Adicionar ingrediente

    </button>

</div>

        </div>

        <!-- MODO DE PREPARO -->

        <div class="campo">

            <label for="modoPreparo">Modo de preparo</label>

            <textarea
                class="resposta"
                id="modoPreparo"
                rows="8"
                placeholder="Explique o passo a passo da receita..."
                required></textarea>

        </div>

        <!-- CUSTO -->

        <div class="campo">

            <label for="custo">Custo estimado</label>
        
            <div class="campo-custo">
                <span class="simbolo-moeda">R$</span>
        
                <input
                    class="resposta resposta-custo"
                    id="custo"
                    type="number"
                    step="0.01"
                    min="0"
                    placeholder="0,00">
            </div>
        
        </div>

        <!-- PORÇÕES -->

        <div class="campo">

            <label for="porcao">Quantidade de porções</label>

            <div class="controle-numero">

                <button
                    type="button"
                    id="btnDiminuir">
                    -
                </button>

                <input
                    class="input-numero"
                    id="porcao"
                    type="number"
                    value="1"
                    min="1">

                <button
                    type="button"
                    id="btnAumentar">
                    +
                </button>

            </div>

        </div>

        <!-- IMAGEM -->

        <div class="campo">

            <label for="imagem">Imagem da receita</label>

            <label
                class="botao-upload"
                for="imagem">

                Escolher imagem

            </label>

            <input
                id="imagem"
                type="file"
                accept="image/*"
                hidden>

        </div>

        <!-- ENVIAR -->

        <button
            type="button"
            class="btn-enviar"
            onclick="enviar()">

            Enviar Receita

        </button>

    </form>

    <div class="linha-bottom"></div>

    <footer>

        <strong>Contato: cicloprolife@gmail.com</strong>

    </footer>

    <script src="../js/novidades.js"></script>

</body>

</html>
