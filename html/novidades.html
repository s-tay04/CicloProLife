<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/novidades.css">
</head>
<body>
    <header class = "cabeca">
     <div class="logo">       <img src="../imagem/logo.png" alt="logo"></div>
      <input class="pesquisa"   type="text" placeholder="Digite aqui...">
     
      <div class="tema" id="toggle-tema">
    <img id="icone-tema" src="../imagem/lua.png" alt="tema"></div>

     <div class="perfil"> 
      <a href="perfil.html">
          <img src="../imagem/perfil.png" alt="perfil">
      </a>
  </div>
    
    </header>

    <div class="linha"></div>

    <nav class="menu">
      <a href="../html/home.html">Início</a>
      <a href="../html/cardapio.html">Cardápio</a>
      <a href="../html/receitasadd.html" class="ativo">Adicionar</a>
      <a href="../html/relatorio.html">Relatórios</a>
    </nav>

<form class="formulario">

    <h2>Adicionar Nova Receita</h2>

    <p class="descricao-form">
        Preencha as informações abaixo para cadastrar sua receita.
    </p>

    <div class="campo">

        <label for="titulo">Nome da receita</label>

        <input
            class="resposta"
            id="titulo"
            type="text"
            placeholder="Ex: Coxinha de jaca"
            required
        >

    </div>

    <div class="campo">

        <label for="ingredientes">Ingredientes</label>

        <textarea
            class="resposta"
            id="ingredientes"
            rows="6"
            placeholder="Digite um ingrediente por linha.
            Ex:
            300g de farinha
            1 xícara de leite
            2 colheres de manteiga"
            required
        ></textarea>

    </div>

    <div class="campo">

        <label for="modoPreparo">Modo de preparo</label>

        <textarea
            class="resposta"
            id="modoPreparo"
            rows="8"
            placeholder="Explique o passo a passo da receita..."
            required
        ></textarea>

    </div>

    <div class="campo">

        <label for="custo">Custo estimado</label>

        <input
            class="resposta"
            id="custo"
            type="number"
            placeholder="Informe o custo total aproximado.
            Ex: R$ 25,00"
        >

    </div>

    <div class="campo">

        <label for="porcao">Quantidade de porções</label>

        <div class="controle-numero">
        
            <button type="button" id="btnDiminuir">-</button>
        
            <input class="input-numero" id="porcao" type="number" value="1" min="1">
        
            <button type="button" id="btnAumentar">+</button>
        
        </div>
        
    </div>

    <div class="campo">

        <label for="imagem">Imagem da receita</label>

        <label class="botao-upload" for="imagem">
            Escolher imagem
        </label>

        <input
            id="imagem"
            type="file"
            accept="image/*"
            hidden
        >

        <img src="https://localhost:7108/uploads/NOME_DA_IMAGEM" />

    </div>

    <button type="button" class="btn-enviar" onclick="enviar()">Enviar Receita</button>
    

</form>

<div class="linha-bottom"></div>

<footer>
    <strong>Contato: cicloprolife@gmail.com</strong>
</footer>

<script src="../js/novidades.js"></script>

</body>
</html>
