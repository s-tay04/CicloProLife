<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar receitas</title>
    <link rel="stylesheet" href="../css/novidades.css">
</head>
<body>
    <header class = "cabeca">
     <div class="logo">       <img src="../imagem/logo.png" alt="logo"></div>
      <input class="pesquisa"   type="text" placeholder="Digite aqui...">
     
      <div class="tema" id="toggle-tema">
    <img id="icone-tema" src="../imagem/lua.png" alt="tema"></div>

     <div class="perfil"> 
      <a href="perfil.html">
          <img src="../imagem/perfil.png" alt="perfil">
      </a>
  </div>
    
    </header>

    <div class="linha"></div>

    <nav class="menu">
      <a href="../html/home.html">Início</a>
      <a href="../html/cardapio.html">Cardápio</a>
      <a href="../html/receitasadd.html" class="ativo">Adicionar</a>
      <a href="../html/relatorio.html">Relatórios</a>
    </nav>

    <form class="formulario">
      <div class="campo">
        <label for="titulo">Digite o nome da receita: </label><br>
        <input class="resposta" id="titulo" type="text" placeholder="Ex: Coxinha de jaca"><br><br>
      </div>

      <div class="campo">
        <label for="ingredientes">Digite os ingerdientes necessários e suas medidas: </label><br>
        <input class="resposta" id="ingredientes" type="text" placeholder="Ex: 300 gramas de farinha"><br><br>
      </div>
      
      <div class="campo">
        <label for="modoPreparo">Digite o modo de preparo da receita: </label><br>
        <input class="resposta" id="modoPreparo" type="text" placeholder="Ex: Ponha a farinha em um pote"><br><br>
      </div>

      <div class="campo">
        <label for="custo">Quanto custa para produzir esta receita? </label><br>
        <input class="resposta" id="custo" type="text" placeholder="Ex: Farinha: R$10,00"><br><br>
      </div>

      <div class="campo">
        <label for="porcao">Quantas porções rendem? </label><br>
        <input class="resposta" id="porcao" type="number" min="1" placeholder="Ex: Rende 20 porções"><br><br>
      </div>

      <div class="campo">
        <label>Imagem da receita:
          <div class="botao-upload">Anexar arquivo</div>
          <input id="imagem" type="file" hidden>
        </label><br> 
    
    </div>

    </form>
     
      <button onclick="enviar()">Enviar receita</button>

    <div class="linha-bottom"></div>

    <footer><strong>Contato: cicloprolife@gmail.com</strong></footer>
    
    <script src="../js/novidades.js"></script>
</body>
</html>
